services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-app
    restart: unless-stopped
    expose:
      - "8501"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-mxbai-embed-large}
    volumes:
      - ./chroma_langchain_db:/app/chroma_langchain_db

  caddy:
    image: caddy:2
    container_name: rag-caddy
    restart: unless-stopped
    depends_on:
      - app
    expose:
      - "80"
    environment:
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

  # Free/zero-domain option: random public URL like https://abc.trycloudflare.com
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: rag-cloudflared
    restart: unless-stopped
    depends_on:
      - caddy
    command: tunnel --no-autoupdate --url http://caddy:80

  # Stable URL option if you later add a Cloudflare-managed domain + tunnel token
  cloudflared-token:
    image: cloudflare/cloudflared:latest
    container_name: rag-cloudflared-token
    restart: unless-stopped
    depends_on:
      - caddy
    profiles: ["token"]
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
